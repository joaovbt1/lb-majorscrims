name: Update leaderboard data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch CSV and convert to JSON
        run: |
          python3 << 'PYEOF'
          import urllib.request, csv, json, io, sys
          from datetime import datetime, timezone

          url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRx3CFe-wdRBOLisZX_QjYLVw7ZEeQBRCw_jbbmOKVue2mZuzp7ZbS1bMiRuJoNEqwE9rYs_q4QN0wd/pub?gid=2097665043&single=true&output=csv"

          print("Fetching CSV...")
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30) as r:
                  raw = r.read().decode('utf-8')
          except Exception as e:
              print(f"ERROR fetching CSV: {e}", file=sys.stderr)
              sys.exit(1)

          print(f"CSV fetched, {len(raw)} bytes")
          print("First 200 chars:", raw[:200])

          reader = csv.reader(io.StringIO(raw))
          rows = list(reader)
          print(f"Total rows: {len(rows)}")

          # Find header row containing 'epic name'
          header_idx = next((i for i, r in enumerate(rows) if any('epic name' in c.lower() for c in r)), None)
          if header_idx is None:
              print("ERROR: Could not find header row with 'epic name'", file=sys.stderr)
              print("All rows:", rows[:10], file=sys.stderr)
              sys.exit(1)

          print(f"Header row at index {header_idx}: {rows[header_idx]}")
          headers = [h.lower().strip() for h in rows[header_idx]]

          def col(name):
              return next((i for i, h in enumerate(headers) if name in h), -1)

          ci_name  = col('epic name') if col('epic name') >= 0 else col('name')
          ci_xp    = col('xp')
          ci_kills = col('kill')
          ci_games = col('game')
          ci_rank  = col('rank')
          print(f"Columns — name:{ci_name} xp:{ci_xp} kills:{ci_kills} games:{ci_games} rank:{ci_rank}")

          if ci_name < 0 or ci_rank < 0:
              print("ERROR: Required columns not found", file=sys.stderr)
              sys.exit(1)

          players = []
          for row in rows[header_idx + 1:]:
              if len(row) < 2:
                  continue
              name = row[ci_name].strip() if ci_name >= 0 else ''
              if not name or name.lower() == 'epic name':
                  continue
              try:
                  rank = int(row[ci_rank])
              except:
                  continue
              players.append({
                  'name':  name,
                  'xp':    int(row[ci_xp])   if ci_xp    >= 0 and row[ci_xp].strip().isdigit()   else 0,
                  'kills': int(row[ci_kills]) if ci_kills >= 0 and row[ci_kills].strip().isdigit() else 0,
                  'games': int(row[ci_games]) if ci_games >= 0 and row[ci_games].strip().isdigit() else 0,
                  'rank':  rank,
              })

          players.sort(key=lambda p: p['xp'], reverse=True)
          print(f"Players found: {len(players)}")

          out = {
              'updated': datetime.now(timezone.utc).isoformat(),
              'players': players,
          }

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False)

          print(f"data.json saved with {len(players)} players")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard data"
          git push
