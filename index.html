<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAJOR SCRIMS — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --green:     #0dff51;
    --green-dim: #09c93e;
    --green-glow:rgba(13,255,81,0.10);
    --bg:        #000;
    --bg3:       #0e0e0e;
    --bg4:       #141414;
    --text:      #e2f0e6;
    --text-dim:  #5a7a62;
    --border:    rgba(13,255,81,0.13);
    --border-hi: rgba(13,255,81,0.32);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:900}
  .corner{position:fixed;width:52px;height:52px;pointer-events:none;z-index:100}
  .corner::before,.corner::after{content:'';position:absolute;background:var(--green-dim)}
  .corner::before{width:2px;height:36px}.corner::after{width:36px;height:2px}
  .corner.tl{top:14px;left:14px}.corner.tl::before{top:0;left:0}.corner.tl::after{top:0;left:0}
  .corner.tr{top:14px;right:14px;transform:scaleX(-1)}.corner.tr::before{top:0;left:0}.corner.tr::after{top:0;left:0}
  .corner.bl{bottom:14px;left:14px;transform:scaleY(-1)}.corner.bl::before{top:0;left:0}.corner.bl::after{top:0;left:0}
  .corner.br{bottom:14px;right:14px;transform:scale(-1)}.corner.br::before{top:0;left:0}.corner.br::after{top:0;left:0}
  .wrapper{max-width:920px;margin:0 auto;padding:40px 20px 80px}
  .header{display:flex;align-items:center;gap:18px;margin-bottom:20px;animation:fadeDown .5s ease both}
  .header-logo{width:64px;height:64px;object-fit:contain;flex-shrink:0;mix-blend-mode:lighten}
  .header-text{flex:1}
  .header-eyebrow{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--green-dim);letter-spacing:.22em;text-transform:uppercase;margin-bottom:4px}
  .header h1{font-size:clamp(24px,4.5vw,42px);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;line-height:1}
  .header h1 span{color:var(--green)}
  .header-sub{margin-top:6px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.1em}
  .header-line{height:1px;background:linear-gradient(90deg,var(--green-dim),transparent);margin-bottom:24px;animation:fadeDown .5s .05s ease both}
  .discord-banner{display:flex;align-items:center;gap:14px;padding:13px 18px;background:var(--bg3);border:1px solid var(--border-hi);border-radius:3px;text-decoration:none;margin-bottom:24px;transition:background .2s,border-color .2s,box-shadow .2s;animation:fadeDown .5s .08s ease both;cursor:pointer}
  .discord-banner:hover{background:var(--bg4);border-color:var(--green);box-shadow:0 0 18px rgba(13,255,81,.08)}
  .discord-banner:hover .banner-arrow{transform:translateX(3px)}
  .banner-logos{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .banner-ms-logo{width:28px;height:28px;object-fit:contain;mix-blend-mode:lighten}
  .banner-sep{width:1px;height:22px;background:var(--border-hi);flex-shrink:0}
  .banner-text{flex:1}
  .banner-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:2px}
  .banner-title{font-size:15px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff}
  .banner-title span{color:var(--green)}
  .banner-arrow{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--green-dim);transition:transform .2s;flex-shrink:0}
  .search-wrap{margin-bottom:16px;animation:fadeDown .5s .12s ease both}
  .search-box{position:relative;display:flex;align-items:center}
  .search-icon{position:absolute;left:13px;width:15px;height:15px;color:var(--text-dim);flex-shrink:0}
  .search-box input{width:100%;background:var(--bg3);border:1px solid var(--border-hi);border-radius:2px;padding:11px 14px 11px 40px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:500;color:var(--text);letter-spacing:.04em;outline:none;transition:border-color .2s,box-shadow .2s}
  .search-box input::placeholder{color:var(--text-dim)}
  .search-box input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(13,255,81,.10)}
  .search-count{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:5px;margin-left:2px;min-height:15px;letter-spacing:.08em}
  .search-count span{color:var(--green-dim)}
  .status-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.08em;animation:fadeDown .5s .14s ease both}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .table-wrap{border:1px solid var(--border);border-radius:2px;overflow:hidden;animation:fadeUp .5s .18s ease both}
  table{width:100%;border-collapse:collapse;font-size:15px}
  thead tr{background:var(--bg3);border-bottom:1px solid var(--border-hi)}
  thead th{padding:11px 14px;text-align:left;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--green-dim);white-space:nowrap}
  thead th.c{text-align:center}
  tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--green-glow)}
  tbody tr.top1{background:rgba(13,255,81,.06)}
  tbody tr.top3{background:rgba(13,255,81,.03)}
  tbody td{padding:0 14px;height:40px;vertical-align:middle;white-space:nowrap}
  td.rank-cell{font-family:'Share Tech Mono',monospace;font-size:13px;text-align:center;width:54px}
  .r1{color:#ffd700}.r2{color:#b0b8b0}.r3{color:#c87533}.rn{color:var(--text-dim)}
  td.name-cell{font-weight:600;font-size:15px;letter-spacing:.02em}
  td.name-cell mark{background:rgba(13,255,81,.22);color:var(--green);border-radius:2px;padding:0 1px}
  td.xp-cell{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green-dim);text-align:center;width:70px}
  td.num{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--text-dim);text-align:center;width:70px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:2px;font-size:11px;font-weight:700;letter-spacing:.07em;white-space:nowrap;border:1px solid}
  .b-legend{background:rgba(255,215,0,.08);color:#e6c200;border-color:rgba(255,215,0,.25)}
  .b-overlord{background:rgba(190,120,255,.08);color:#bf7aff;border-color:rgba(190,120,255,.25)}
  .b-grandmaster{background:rgba(80,160,255,.08);color:#5aa0ff;border-color:rgba(80,160,255,.25)}
  .b-master{background:rgba(13,255,81,.08);color:#0dcc44;border-color:rgba(13,255,81,.25)}
  .b-diamond{background:rgba(60,210,255,.08);color:#3cd2ff;border-color:rgba(60,210,255,.25)}
  .b-gold{background:rgba(255,175,0,.08);color:#ffaf00;border-color:rgba(255,175,0,.25)}
  .b-bronze{background:rgba(185,110,55,.08);color:#c07840;border-color:rgba(185,110,55,.25)}
  .state-box{padding:56px 24px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:.12em;border:1px solid var(--border);border-radius:2px}
  .state-box.error{color:#e05050;border-color:rgba(220,60,60,.2)}
  .loader{display:block;width:22px;height:22px;border:2px solid var(--border-hi);border-top-color:var(--green);border-radius:50%;margin:14px auto 0;animation:spin .75s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .legend{margin-top:24px;display:flex;flex-wrap:wrap;gap:7px;animation:fadeUp .5s .22s ease both}
  .legend-title{width:100%;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.16em;text-transform:uppercase;margin-bottom:1px}
  @keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:600px){.wrapper{padding:28px 14px 60px}.corner{display:none}.header-logo{width:48px;height:48px}.col-kills,.col-games{display:none}.badge{font-size:10px;padding:2px 6px}.discord-banner{padding:11px 13px;gap:10px}.banner-title{font-size:13px}}
  @media(max-width:400px){.col-cargo{display:none}}
</style>
</head>

</div>
<script>
(function(){
  const TIERS=[
    {max:10,  label:'MS Legend',      icon:'👑',cls:'b-legend'},
    {max:100, label:'MS Overlord',    icon:'⚔️',cls:'b-overlord'},
    {max:200, label:'MS Grandmaster', icon:'🏆',cls:'b-grandmaster'},
    {max:300, label:'MS Master',      icon:'🌟',cls:'b-master'},
    {max:500, label:'MS Diamond',     icon:'💎',cls:'b-diamond'},
    {max:750, label:'MS Gold',        icon:'🥇',cls:'b-gold'},
    {max:1000,label:'MS Bronze',      icon:'🥉',cls:'b-bronze'},
  ];
  const gt=r=>TIERS.find(t=>r<=t.max)||TIERS[TIERS.length-1];
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function hl(text,q){
    if(!q)return esc(text);
    const i=text.toLowerCase().indexOf(q.toLowerCase());
    if(i===-1)return esc(text);
    return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
  }
  function rc(r){return r===1?'r1':r===2?'r2':r===3?'r3':'rn'}
  function trCls(r){return r===1?'top1':r<=3?'top3':''}
  let all=[],query='';
  function render(){
    const q=query.trim();
    const list=q?all.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())):all;
    const ce=document.getElementById('search-count');
    ce.innerHTML=q?(list.length>0?'<span>'+list.length+'</span> jogador'+(list.length!==1?'es':'')+' encontrado'+(list.length!==1?'s':''):'Nenhum resultado'):'';
    const area=document.getElementById('table-area');
    if(!list.length){area.innerHTML='<div class="state-box">// NENHUM JOGADOR ENCONTRADO</div>';return}
    const tbody=list.map(p=>{
      const t=gt(p.rank);
      return `<tr class="${trCls(p.rank)}">
        <td class="rank-cell ${rc(p.rank)}">${p.rank}</td>
        <td class="name-cell">${hl(p.name,q)}</td>
        <td class="col-cargo"><span class="badge ${t.cls}">${t.icon} ${t.label}</span></td>
        <td class="xp-cell">${p.xp}</td>
        <td class="num col-kills">${p.kills}</td>
        <td class="num col-games">${p.games}</td>
      </tr>`;
    }).join('');
    area.innerHTML=`<div class="table-wrap"><table>
      <thead><tr>
        <th class="c" style="width:54px">RANK</th>
        <th>EPIC NAME</th>
        <th class="col-cargo">CARGO</th>
        <th class="c">XP</th>
        <th class="c col-kills">KILLS</th>
        <th class="c col-games">GAMES</th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table></div>`;
  }
  async function load(){
    try{
      const res=await fetch('data.json?t='+Date.now());
      if(!res.ok)throw new Error();
      const data=await res.json();
      all=data.players||[];
      const updated=data.updated?new Date(data.updated).toLocaleString('pt-BR'):'agora';
      document.getElementById('status-text').textContent=all.length+' jogadores · atualizado '+updated;
      document.getElementById('legend').style.display='flex';
      render();
    }catch(e){
      document.getElementById('table-area').innerHTML='<div class="state-box error">// ERRO AO CARREGAR DADOS</div>';
      document.getElementById('status-text').textContent='Erro ao carregar';
    }
  }
  document.getElementById('search').addEventListener('input',function(){query=this.value;render()});
  load();
})();
</script>
